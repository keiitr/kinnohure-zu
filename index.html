<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>銀フレ 001–200</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="銀フレ">
<meta name="theme-color" content="#12151F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{
  --bg:#12151F; --card:#1D2334; --card-hi:#252c42;
  --ink:#F7F5F0; --muted:#9AA3B8; --line:#323B54;
  --acc:#F97B2F; --acc-soft:#FFB27A; --ok:#F97B2F;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  background:var(--bg); color:var(--ink);
  font-family:"Avenir Next","Hiragino Sans","Hiragino Kaku Gothic ProN",-apple-system,sans-serif;
  display:flex; flex-direction:column;
  padding:calc(var(--safe-top) + 10px) 16px calc(var(--safe-bottom) + 12px);
  user-select:none;-webkit-user-select:none;
  max-width:560px;margin:0 auto;width:100%;
}
header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
h1{font-size:18px;font-weight:700;letter-spacing:.02em}
h1 small{color:var(--acc);font-weight:600;margin-left:6px;font-size:12px}
#stat{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
#stat b{color:var(--acc);font-weight:700;font-size:15px}

#bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:12px}
#barFill{height:100%;width:0;background:var(--acc);border-radius:3px;transition:width .3s}

#chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
#chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;border:1.5px solid var(--line);color:#C6CCDA;background:transparent;
  border-radius:999px;padding:9px 16px;font-size:14px;font-weight:600;font-family:inherit;
  font-variant-numeric:tabular-nums;
}
.chip.on{background:var(--acc);border-color:var(--acc);color:#12151F;font-weight:700}
.chip .dot{display:inline-block;width:7px;height:7px;border-radius:4px;background:var(--acc);margin-right:6px;vertical-align:1px}
.chip.on .dot{background:#12151F}

#tools{display:flex;gap:8px;margin-bottom:10px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#tools::-webkit-scrollbar{display:none}
.tool{
  flex-shrink:0;border:1.5px solid var(--line);background:var(--card);color:#C6CCDA;
  border-radius:12px;padding:10px 15px;font-size:13.5px;font-weight:600;font-family:inherit;white-space:nowrap;
}
.tool.on{color:var(--acc);border-color:var(--acc);font-weight:700}

#stage{flex:1;display:flex;flex-direction:column;min-height:0}
#card{
  flex:1;background:var(--card);border:1.5px solid var(--line);border-radius:20px;
  padding:26px 22px;display:flex;flex-direction:column;justify-content:center;gap:20px;
  position:relative;overflow:hidden;min-height:0;
}
#card:active{background:var(--card-hi)}
#num{
  position:absolute;top:16px;left:20px;font-size:13px;font-weight:700;color:var(--muted);
  font-variant-numeric:tabular-nums;letter-spacing:.08em;padding:4px 6px;margin:-4px -6px;
}
#num b{color:var(--acc);font-size:15px}
#knownTag{
  position:absolute;top:14px;right:16px;font-size:12px;font-weight:700;color:var(--acc);
  border:1.5px solid var(--acc);border-radius:999px;padding:4px 11px;display:none;
}
#ja{font-size:19px;line-height:1.65;color:var(--acc-soft);font-weight:700}
#en{font-size:26px;line-height:1.5;font-weight:600;letter-spacing:.01em;overflow-wrap:break-word}
#en .blank{
  color:var(--acc);border-bottom:2.5px dashed var(--acc);padding:0 2px;
  font-variant-numeric:tabular-nums;letter-spacing:.06em;
}
#en .fill{color:var(--acc);border-bottom:2.5px solid var(--acc);padding:0 2px;animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
#answer{display:none;border-top:1.5px solid var(--line);padding-top:18px}
#word{font-size:36px;font-weight:700;color:var(--acc);margin-bottom:10px;letter-spacing:.01em}
#mean{font-size:17px;line-height:1.8;color:var(--ink)}
#mean .pos{
  display:inline-block;font-size:12px;font-weight:700;color:#12151F;background:var(--muted);
  border-radius:5px;padding:2px 7px;margin-right:8px;vertical-align:1.5px;
}
#hint{
  text-align:center;color:var(--muted);font-size:13px;margin-top:auto;padding-top:12px;
}
#speak{
  position:absolute;bottom:14px;right:14px;width:48px;height:48px;border-radius:24px;
  border:1.5px solid var(--acc);background:transparent;color:var(--acc);font-size:20px;
  display:flex;align-items:center;justify-content:center;font-family:inherit;
}
#speak:active{background:var(--acc);color:#12151F}
#speak.playing{background:var(--acc);color:#12151F}
#empty{flex:1;display:none;align-items:center;justify-content:center;color:var(--muted);font-size:14px;text-align:center;line-height:1.8}

#actions{display:flex;gap:10px;margin-top:12px;flex-shrink:0}
.act{
  flex:1;border:none;border-radius:16px;padding:18px 0;font-size:17px;font-weight:700;font-family:inherit;
}
.act:active{opacity:.75}
#btnAgain{background:var(--card);color:var(--ink);border:1.5px solid var(--line)}
#btnKnown{background:var(--acc);color:#12151F}
.act small{display:block;font-size:11px;font-weight:600;opacity:.7;margin-top:3px}

/* list view */
#list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;border-radius:16px}
.row{
  display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--line);
  border-radius:14px;padding:14px;margin-bottom:8px;
}
.row .rn{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;width:28px;flex-shrink:0}
.row .rw{font-size:17px;font-weight:700;width:34%;flex-shrink:0;overflow-wrap:break-word}
.row .rm{font-size:13.5px;color:#C6CCDA;line-height:1.55;flex:1}
.row .rk{
  width:30px;height:30px;border-radius:15px;border:1.5px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:15px;color:transparent;
}
.row.known .rk{background:var(--acc);border-color:var(--acc);color:#12151F}
.row.known .rw{color:var(--acc)}
</style>
</head>
<body>
<header>
  <h1>銀フレ<small>Score 600 / 001–200</small></h1>
  <div id="stat"></div>
</header>
<div id="bar"><div id="barFill"></div></div>

<div id="chips"></div>
<div id="tools">
  <button class="tool" id="tJump">▶ 番号から</button>
  <button class="tool" id="tShuffle">🔀 シャッフル</button>
  <button class="tool" id="tWeak">苦手のみ</button>
  <button class="tool" id="tAuto">🔊 自動</button>
  <button class="tool" id="tList">一覧</button>
</div>

<div id="stage">

    <div id="answer">
      <div id="word"></div>
      <div id="mean"></div>
    </div>
    <div id="hint">タップして答えを表示</div>
    <button id="speak" aria-label="英語を再生">🔊</button>

  <div id="actions">
    <button class="act" id="btnAgain">まだ<small>もう一度出題</small></button>
    <button class="act" id="btnKnown">覚えた<small>チェックを付ける</small></button>
  </div>
</div>
<div id="list"></div>

const KEY="ginfure600_v1";
let S; try{S=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){S={}}
S.known=S.known||{};           // {番号:true}
S.range=S.range??"all";        // "all" or 0..9
S.shuffle=S.shuffle??false;
S.weak=S.weak??false;
S.auto=S.auto??true;           // 答え表示時に自動読み上げ

// ---- 音声(Web Speech API / iOS対応) ----
let enVoice=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  if(!vs.length)return;
  enVoice =
    vs.find(v=>/^en[-_]US/i.test(v.lang)&&/Samantha|Ava|Allison|Enhanced|Premium/i.test(v.name)) ||
    vs.find(v=>/^en[-_]US/i.test(v.lang)) ||
    vs.find(v=>/^en/i.test(v.lang)) || null;
}
if("speechSynthesis" in window){
  pickVoice();
  speechSynthesis.onvoiceschanged=pickVoice;
}
function speak(text){
  if(!("speechSynthesis" in window)||!text)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";
  if(enVoice)u.voice=enVoice;
  u.rate=0.92;
  const btn=$("speak");
  u.onstart=()=>btn&&btn.classList.add("playing");
  u.onend=u.onerror=()=>btn&&btn.classList.remove("playing");
  speechSynthesis.speak(u);
}
function currentAudioText(){
  if(!deck.length)return"";
  const d=deck[idx];
  const sentence=d[3].replace(/[{}]/g,"").replace(/〜/g,"");
  // 答え表示前は単語を伏せてフレーズだけ、表示後は「単語 → フレーズ」
  return revealed ? d[1]+". ... "+sentence : sentence;
}
const save=()=>localStorage.setItem(KEY,JSON.stringify(S));

const $=id=>document.getElementById(id);
let deck=[], idx=0, revealed=false, listMode=false;

function buildChips(){
  const c=$("chips"); c.innerHTML="";
  const mk=(label,val)=>{
    const b=document.createElement("button");
    b.className="chip"+(S.range===val?" on":"");
    const done=val==="all"
      ? Object.keys(S.known).length
      : D.slice(val*10,val*10+10).filter(d=>S.known[d[0]]).length;
    const total=val==="all"?D.length:10;
    b.innerHTML=(done===total?'<span class="dot"></span>':"")+label;
    b.onclick=()=>{S.range=val;save();refresh(true)};
    c.appendChild(b);
  };
  mk("全部","all");
  for(let i=0;i<20;i++) mk(`${String(i*10+1).padStart(3,"0")}–${String(i*10+10).padStart(3,"0")}`,i);
}

function buildDeck(){
  let d=S.range==="all"?D.slice():D.slice(S.range*10,S.range*10+10);
  if(S.weak) d=d.filter(x=>!S.known[x[0]]);
  if(S.shuffle){d=d.slice();for(let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]]}}
  deck=d; idx=Math.min(idx,Math.max(0,deck.length-1));
}

function phrase(en,reveal){
  return en.replace(/\{([^}]+)\}/,(_,w)=>{
    if(reveal) return `<span class="fill">${w}</span>`;
    const cap=w[0]===w[0].toUpperCase();
    const head=w.slice(0,1);
    return `<span class="blank">${head}${"–".repeat(Math.max(4,Math.min(8,w.length-1)))}</span>`;
  });
}

function renderCard(){
  const has=deck.length>0;
  $("card").style.display=has?"flex":"none";
  $("empty").style.display=has?"none":"flex";
  $("actions").style.visibility=has?"visible":"hidden";
  if(!has)return;
  const d=deck[idx];
  $("num").innerHTML=`<b>${String(d[0]).padStart(3,"0")}</b> / ${D.length} 　 ${idx+1}/${deck.length}`;
  $("knownTag").style.display=S.known[d[0]]?"block":"none";
  $("ja").textContent=d[4];
  $("en").innerHTML=phrase(d[3],revealed);
  $("answer").style.display=revealed?"block":"none";
  if(revealed){
    $("word").textContent=d[1];
    $("mean").innerHTML=d[2].map(([p,m])=>`<div><span class="pos">${p}</span>${m}</div>`).join("");
  }
  $("hint").textContent=revealed?"「まだ / 覚えた」を選んで次へ":"タップして答えを表示";
}

function renderStat(){
  const n=Object.keys(S.known).length;
  $("stat").innerHTML=`覚えた <b>${n}</b> / ${D.length}`;
  $("barFill").style.width=(n/D.length*100)+"%";
}

function renderList(){
  const L=$("list"); L.innerHTML="";
  const src=S.range==="all"?D:D.slice(S.range*10,S.range*10+10);
  src.forEach(d=>{
    const r=document.createElement("div");
    r.className="row"+(S.known[d[0]]?" known":"");
    r.innerHTML=`<span class="rn">${String(d[0]).padStart(3,"0")}</span>
      <span class="rw">${d[1]}</span>
      <span class="rm">${d[2].map(x=>x[1]).join(" / ")}</span>
      <span class="rk">✓</span>`;
    r.onclick=()=>{
      if(S.known[d[0]]) delete S.known[d[0]]; else S.known[d[0]]=true;
      save(); refresh(false);
    };
    L.appendChild(r);
  });
}

function refresh(resetIdx){
  if(resetIdx){idx=0;revealed=false}
  buildChips(); buildDeck(); renderStat();
  refreshView();
}

$("card").onclick=()=>{
  if(!revealed){
    revealed=true;renderCard();
    if(S.auto)speak(currentAudioText());
  }
};
$("speak").onclick=e=>{e.stopPropagation();speak(currentAudioText())};
function next(mark){
  if(!deck.length)return;
  if("speechSynthesis" in window)speechSynthesis.cancel();
  const d=deck[idx];
  if(mark){S.known[d[0]]=true} else {delete S.known[d[0]]}
  save();
  if(S.weak&&mark){deck.splice(idx,1); if(idx>=deck.length)idx=0}
  else{idx=(idx+1)%deck.length}
  revealed=false; buildChips(); renderStat(); renderCard();
}
$("btnKnown").onclick=()=>next(true);
$("btnAgain").onclick=()=>next(false);
$("tShuffle").onclick=()=>{S.shuffle=!S.shuffle;save();refresh(true)};
$("tWeak").onclick=()=>{S.weak=!S.weak;save();refresh(true)};
$("tAuto").onclick=()=>{S.auto=!S.auto;save();refresh(false)};

function jumpTo(n){
  n=parseInt(n,10);
  if(!(n>=1&&n<=D.length)){if(!isNaN(n))alert("1〜"+D.length+"の番号を入力してください");return}
  // 指定番号を含む範囲に切り替え、その番号から順番に出題
  if(S.range!=="all")S.range=Math.floor((n-1)/10); // 範囲学習中なら該当チップへ、全部なら全部のまま
  S.shuffle=false; S.weak=false;                    // 「〜番から順に」の意図を優先
  save(); listMode=false;
  buildChips(); buildDeck();
  idx=Math.max(0,deck.findIndex(d=>d[0]===n));
  revealed=false;
  renderStat(); refreshView();
}
function refreshView(){
  $("tShuffle").classList.toggle("on",S.shuffle);
  $("tWeak").classList.toggle("on",S.weak);
  $("tAuto").classList.toggle("on",S.auto);
  $("tList").classList.toggle("on",listMode);
  $("stage").style.display=listMode?"none":"flex";
  $("list").style.display=listMode?"block":"none";
  if(listMode)renderList(); else renderCard();
}
const askJump=()=>{const v=prompt("何番から始めますか? (1〜"+D.length+")");if(v!==null&&v.trim()!=="")jumpTo(v.trim())};
$("tJump").onclick=askJump;
$("num").onclick=e=>{e.stopPropagation();askJump()};
$("tList").onclick=()=>{listMode=!listMode;refresh(false)};

refresh(true);
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
