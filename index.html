<style>
:root{
  --bg:#12151F; --card:#1C2130; --card-hi:#232a3d;
  --ink:#F2EFE8; --muted:#8B93A7; --line:#2C3448;
  --acc:#F97B2F; --acc-soft:#FFB27A; --ok:#F97B2F;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  background:var(--bg); color:var(--ink);
  font-family:"Avenir Next","Hiragino Sans","Hiragino Kaku Gothic ProN",-apple-system,sans-serif;
  display:flex; flex-direction:column;
  padding:calc(var(--safe-top) + 10px) 16px calc(var(--safe-bottom) + 12px);
  user-select:none;-webkit-user-select:none;
  max-width:560px;margin:0 auto;width:100%;
}
header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
h1{font-size:17px;font-weight:700;letter-spacing:.02em}
h1 small{color:var(--acc);font-weight:600;margin-left:6px;font-size:12px}
#stat{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
#stat b{color:var(--acc);font-weight:700}

#bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:12px}
#barFill{height:100%;width:0;background:var(--acc);border-radius:2px;transition:width .3s}

#chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
#chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;border:1px solid var(--line);color:var(--muted);background:transparent;
  border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;font-family:inherit;
  font-variant-numeric:tabular-nums;
}
.chip.on{background:var(--acc);border-color:var(--acc);color:#12151F}
.chip .dot{display:inline-block;width:6px;height:6px;border-radius:3px;background:var(--acc);margin-right:5px;vertical-align:1px}
.chip.on .dot{background:#12151F}

#tools{display:flex;gap:8px;margin-bottom:10px;flex-shrink:0}
.tool{
  flex:1;border:1px solid var(--line);background:var(--card);color:var(--muted);
  border-radius:10px;padding:8px 0;font-size:12.5px;font-weight:600;font-family:inherit;
}
.tool.on{color:var(--acc);border-color:var(--acc)}

#stage{flex:1;display:flex;flex-direction:column;min-height:0}
#card{
  flex:1;background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:24px 22px;display:flex;flex-direction:column;justify-content:center;gap:18px;
  position:relative;overflow:hidden;min-height:0;
}
#card:active{background:var(--card-hi)}
#num{
  position:absolute;top:16px;left:20px;font-size:12px;font-weight:700;color:var(--muted);
  font-variant-numeric:tabular-nums;letter-spacing:.08em;
}
#num b{color:var(--acc)}
#knownTag{
  position:absolute;top:14px;right:16px;font-size:11px;font-weight:700;color:var(--acc);
  border:1px solid var(--acc);border-radius:999px;padding:3px 10px;display:none;
}
#ja{font-size:17px;line-height:1.6;color:var(--acc-soft);font-weight:600}
#en{font-size:24px;line-height:1.5;font-weight:600;letter-spacing:.01em;overflow-wrap:break-word}
#en .blank{
  color:var(--acc);border-bottom:2px dashed var(--acc);padding:0 2px;
  font-variant-numeric:tabular-nums;letter-spacing:.06em;
}
#en .fill{color:var(--acc);border-bottom:2px solid var(--acc);padding:0 2px;animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
#answer{display:none;border-top:1px solid var(--line);padding-top:16px}
#word{font-size:30px;font-weight:700;color:var(--acc);margin-bottom:6px;letter-spacing:.01em}
#mean{font-size:15.5px;line-height:1.7;color:var(--ink)}
#mean .pos{
  display:inline-block;font-size:11px;font-weight:700;color:#12151F;background:var(--muted);
  border-radius:4px;padding:1px 6px;margin-right:6px;vertical-align:1.5px;
}
#hint{
  text-align:center;color:var(--muted);font-size:12.5px;margin-top:auto;padding-top:12px;
}
#speak{
  position:absolute;bottom:14px;right:14px;width:44px;height:44px;border-radius:22px;
  border:1px solid var(--acc);background:transparent;color:var(--acc);font-size:19px;
  display:flex;align-items:center;justify-content:center;font-family:inherit;
}
#speak:active{background:var(--acc);color:#12151F}
#speak.playing{background:var(--acc);color:#12151F}
#empty{flex:1;display:none;align-items:center;justify-content:center;color:var(--muted);font-size:14px;text-align:center;line-height:1.8}

#actions{display:flex;gap:10px;margin-top:12px;flex-shrink:0}
.act{
  flex:1;border:none;border-radius:14px;padding:16px 0;font-size:16px;font-weight:700;font-family:inherit;
}
.act:active{opacity:.75}
#btnAgain{background:var(--card);color:var(--ink);border:1px solid var(--line)}
#btnKnown{background:var(--acc);color:#12151F}
.act small{display:block;font-size:10.5px;font-weight:600;opacity:.65;margin-top:2px}

/* list view */
#list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;border-radius:16px}
.row{
  display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;
}
.row .rn{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;width:26px;flex-shrink:0}
.row .rw{font-size:16px;font-weight:700;width:34%;flex-shrink:0;overflow-wrap:break-word}
.row .rm{font-size:12.5px;color:var(--muted);line-height:1.5;flex:1}
.row .rk{
  width:26px;height:26px;border-radius:13px;border:1.5px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;
}
.row.known .rk{background:var(--acc);border-color:var(--acc);color:#12151F}
.row.known .rw{color:var(--acc)}
</style>
</head>

// ---- 音声(Web Speech API / iOS対応) ----
let enVoice=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  if(!vs.length)return;
  enVoice =
    vs.find(v=>/^en[-_]US/i.test(v.lang)&&/Samantha|Ava|Allison|Enhanced|Premium/i.test(v.name)) ||
    vs.find(v=>/^en[-_]US/i.test(v.lang)) ||
    vs.find(v=>/^en/i.test(v.lang)) || null;
}
if("speechSynthesis" in window){
  pickVoice();
  speechSynthesis.onvoiceschanged=pickVoice;
}
function speak(text){
  if(!("speechSynthesis" in window)||!text)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";
  if(enVoice)u.voice=enVoice;
  u.rate=0.92;
  const btn=$("speak");
  u.onstart=()=>btn&&btn.classList.add("playing");
  u.onend=u.onerror=()=>btn&&btn.classList.remove("playing");
  speechSynthesis.speak(u);
}
function currentAudioText(){
  if(!deck.length)return"";
  const d=deck[idx];
  const sentence=d[3].replace(/[{}]/g,"").replace(/〜/g,"");
  // 答え表示前は単語を伏せてフレーズだけ、表示後は「単語 → フレーズ」
  return revealed ? d[1]+". ... "+sentence : sentence;
}
const save=()=>localStorage.setItem(KEY,JSON.stringify(S));

const $=id=>document.getElementById(id);
let deck=[], idx=0, revealed=false, listMode=false;

function buildChips(){
  const c=$("chips"); c.innerHTML="";
  const mk=(label,val)=>{
    const b=document.createElement("button");
    b.className="chip"+(S.range===val?" on":"");
    const done=val==="all"
      ? Object.keys(S.known).length
      : D.slice(val*10,val*10+10).filter(d=>S.known[d[0]]).length;
    const total=val==="all"?100:10;
    b.innerHTML=(done===total?'<span class="dot"></span>':"")+label;
    b.onclick=()=>{S.range=val;save();refresh(true)};
    c.appendChild(b);
  };
  mk("全部","all");
  for(let i=0;i<10;i++) mk(`${String(i*10+1).padStart(3,"0")}–${String(i*10+10).padStart(3,"0")}`,i);
}

function buildDeck(){
  let d=S.range==="all"?D.slice():D.slice(S.range*10,S.range*10+10);
  if(S.weak) d=d.filter(x=>!S.known[x[0]]);
  if(S.shuffle){d=d.slice();for(let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]]}}
  deck=d; idx=Math.min(idx,Math.max(0,deck.length-1));
}

function phrase(en,reveal){
  return en.replace(/\{([^}]+)\}/,(_,w)=>{
    if(reveal) return `<span class="fill">${w}</span>`;
    const cap=w[0]===w[0].toUpperCase();
    const head=w.slice(0,1);
    return `<span class="blank">${head}${"–".repeat(Math.max(4,Math.min(8,w.length-1)))}</span>`;
  });
}

function renderCard(){
  const has=deck.length>0;
  $("card").style.display=has?"flex":"none";
  $("empty").style.display=has?"none":"flex";
  $("actions").style.visibility=has?"visible":"hidden";
  if(!has)return;
  const d=deck[idx];
  $("num").innerHTML=`<b>${String(d[0]).padStart(3,"0")}</b> / 100 　 ${idx+1}/${deck.length}`;
  $("knownTag").style.display=S.known[d[0]]?"block":"none";
  $("ja").textContent=d[4];
  $("en").innerHTML=phrase(d[3],revealed);
  $("answer").style.display=revealed?"block":"none";
  if(revealed){
    $("word").textContent=d[1];
    $("mean").innerHTML=d[2].map(([p,m])=>`<div><span class="pos">${p}</span>${m}</div>`).join("");
  }
  $("hint").textContent=revealed?"「まだ / 覚えた」を選んで次へ":"タップして答えを表示";
}

function renderStat(){
  const n=Object.keys(S.known).length;
  $("stat").innerHTML=`覚えた <b>${n}</b> / 100`;
  $("barFill").style.width=n+"%";
}

function renderList(){
  const L=$("list"); L.innerHTML="";
  const src=S.range==="all"?D:D.slice(S.range*10,S.range*10+10);
  src.forEach(d=>{
    const r=document.createElement("div");
    r.className="row"+(S.known[d[0]]?" known":"");
    r.innerHTML=`<span class="rn">${String(d[0]).padStart(3,"0")}</span>
      <span class="rw">${d[1]}</span>
      <span class="rm">${d[2].map(x=>x[1]).join(" / ")}</span>
      <span class="rk">✓</span>`;
    r.onclick=()=>{
      if(S.known[d[0]]) delete S.known[d[0]]; else S.known[d[0]]=true;
      save(); refresh(false);
    };
    L.appendChild(r);
  });
}

function refresh(resetIdx){
  if(resetIdx){idx=0;revealed=false}
  buildChips(); buildDeck(); renderStat();
  $("tShuffle").classList.toggle("on",S.shuffle);
  $("tWeak").classList.toggle("on",S.weak);
  $("tAuto").classList.toggle("on",S.auto);
  $("tList").classList.toggle("on",listMode);
  $("stage").style.display=listMode?"none":"flex";
  $("list").style.display=listMode?"block":"none";
  if(listMode) renderList(); else renderCard();
}

$("card").onclick=()=>{
  if(!revealed){
    revealed=true;renderCard();
    if(S.auto)speak(currentAudioText());
  }
};
$("speak").onclick=e=>{e.stopPropagation();speak(currentAudioText())};
function next(mark){
  if(!deck.length)return;
  if("speechSynthesis" in window)speechSynthesis.cancel();
  const d=deck[idx];
  if(mark){S.known[d[0]]=true} else {delete S.known[d[0]]}
  save();
  if(S.weak&&mark){deck.splice(idx,1); if(idx>=deck.length)idx=0}
  else{idx=(idx+1)%deck.length}
  revealed=false; buildChips(); renderStat(); renderCard();
}
$("btnKnown").onclick=()=>next(true);
$("btnAgain").onclick=()=>next(false);
$("tShuffle").onclick=()=>{S.shuffle=!S.shuffle;save();refresh(true)};
$("tWeak").onclick=()=>{S.weak=!S.weak;save();refresh(true)};
$("tAuto").onclick=()=>{S.auto=!S.auto;save();refresh(false)};
$("tList").onclick=()=>{listMode=!listMode;refresh(false)};

refresh(true);
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
